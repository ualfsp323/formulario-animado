<app-home *ngIf="showHome" [userName]="user.nombre" [userPhoto]="user.foto"></app-home>

<div *ngIf="!showHome" class="form-wrapper">
  <app-timer></app-timer>
  <app-monkey-background></app-monkey-background>

  <div class="form-container" [class.submitted]="submitted">
    <h1 class="form-title">Registro de Usuario</h1>
    
    <form (ngSubmit)="onSubmit()" #userForm="ngForm">
      <app-photo-upload (photoSelected)="onPhotoSelected($event)"></app-photo-upload>

      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input 
          type="text" 
          id="nombre" 
          name="nombre"
          [(ngModel)]="user.nombre" 
          required
          placeholder="Ingresa tu nombre">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="user.email" 
          required
          placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input 
          type="tel" 
          id="telefono" 
          name="telefono"
          [(ngModel)]="user.telefono" 
          placeholder="+34 600 000 000">
      </div>

      <div class="form-group">
        <label for="edad">Edad</label>
        <input 
          type="number" 
          id="edad" 
          name="edad"
          [(ngModel)]="user.edad" 
          min="18" 
          max="100"
          placeholder="18">
      </div>

      <button type="submit" class="submit-btn" [disabled]="!userForm.valid">
        <span *ngIf="!submitted">Registrar</span>
        <span *ngIf="submitted">✓ Registrado</span>
      </button>
    </form>

    <div class="success-message" *ngIf="submitted">
      ¡Usuario registrado exitosamente!
    </div>
  </div>
</div>
