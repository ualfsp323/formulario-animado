<app-home *ngIf="showHome" [userName]="user.nombre" [userPhoto]="user.foto"></app-home>

<div *ngIf="!showHome" class="form-wrapper">
  <app-timer></app-timer>
  <app-monkey-background></app-monkey-background>

  <div class="form-container" [class.submitted]="submitted">
    <h1 class="form-title">Registro de Usuario</h1>
    
    <form (ngSubmit)="onSubmit($event)" #userForm="ngForm">
      <app-photo-upload (photoSelected)="onPhotoSelected($event)"></app-photo-upload>

      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input 
          type="text" 
          id="nombre" 
          name="nombre"
          [(ngModel)]="user.nombre" 
          required
          minlength="3"
          #nombre="ngModel"
          placeholder="Ingresa tu nombre">
        <div class="error" *ngIf="nombre.invalid && nombre.touched">
          El nombre debe tener al menos 3 caracteres
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          [(ngModel)]="user.email" 
          required
          email
          #email="ngModel"
          placeholder="tu@email.com">
        <div class="error" *ngIf="email.invalid && email.touched">
          Ingresa un email válido
        </div>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input 
          type="tel" 
          id="telefono" 
          name="telefono"
          [(ngModel)]="user.telefono"
          pattern="[0-9]{9}"
          #telefono="ngModel"
          placeholder="600000000">
        <div class="error" *ngIf="telefono.invalid && telefono.touched">
          El teléfono debe tener 9 dígitos
        </div>
      </div>

      <div class="form-group">
        <label for="edad">Edad</label>
        <input 
          type="number" 
          id="edad" 
          name="edad"
          [(ngModel)]="user.edad" 
          min="18" 
          max="100"
          required
          #edad="ngModel"
          placeholder="18">
        <div class="error" *ngIf="edad.invalid && edad.touched">
          La edad debe estar entre 18 y 100 años
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="!userForm.valid || registering">
        <span *ngIf="!registering && !submitted">Registrar</span>
        <span *ngIf="registering" class="loading-text">
          <span class="spinner-small"></span>
          Registrando...
        </span>
        <span *ngIf="submitted && !registering">✓ Registrado</span>
      </button>
    </form>

    <div class="success-overlay" *ngIf="submitted">
      <div class="success-card">
        <div class="success-icon">
          <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        <h2>¡Registro Exitoso!</h2>
        <p>Bienvenido, {{ user.nombre }}</p>
      </div>
    </div>
  </div>
</div>
