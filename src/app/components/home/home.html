<app-games *ngIf="showGames" [userPhoto]="userPhoto" (backToHome)="toggleGames()"></app-games>

<div *ngIf="!showGames" class="home-wrapper" [style.background-color]="backgroundColor">
  <app-timer></app-timer>
  <app-monkey-background></app-monkey-background>

  <div class="side-image left" *ngIf="leftImage">
    <img [src]="leftImage" alt="Left decoration">
  </div>

  <div class="user-profile">
    <div class="profile-photo">
      <img *ngIf="userPhoto" [src]="userPhoto" alt="User Photo">
      <div *ngIf="!userPhoto" class="placeholder-photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
    </div>
    <h1 class="user-name">{{ userName || 'Usuario' }}</h1>
    
    <button class="customize-btn" (click)="toggleCustomization()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/>
      </svg>
      Personalizar
    </button>
    
    <button class="games-btn" (click)="toggleGames()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21.58 16.09l-1.09-7.66A3.996 3.996 0 0 0 16.53 5H7.47C5.48 5 3.79 6.46 3.51 8.43l-1.09 7.66C2.2 17.63 3.39 19 4.94 19c.68 0 1.32-.27 1.8-.75L9 16h6l2.25 2.25c.48.48 1.13.75 1.8.75 1.56 0 2.75-1.37 2.53-2.91zM11 11H9v2H8v-2H6v-1h2V8h1v2h2v1zm4-1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2 3c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
      </svg>
      Juegos
    </button>
  </div>

  <div class="side-image right" *ngIf="rightImage">
    <img [src]="rightImage" alt="Right decoration">
  </div>

  <app-customization 
    *ngIf="showCustomization"
    [currentConfig]="{backgroundColor, leftImage, rightImage}"
    (configChange)="onCustomizationChange($event)"
    (close)="toggleCustomization()">
  </app-customization>
</div>
