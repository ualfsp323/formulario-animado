<div class="photo-container">
  <div class="photo-preview" [class.has-photo]="photoPreview">
    <img *ngIf="photoPreview" [src]="photoPreview" alt="Preview">
    <div *ngIf="!photoPreview" class="placeholder">
      <svg class="camera-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
      <p>Sube tu foto</p>
    </div>
  </div>
  <input type="file" (change)="onFileSelected($event)" accept="image/*" id="photo-input">
  <label for="photo-input" class="upload-btn">
    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="17 8 12 3 7 8"></polyline>
      <line x1="12" y1="3" x2="12" y2="15"></line>
    </svg>
    Seleccionar Foto
  </label>
</div>
