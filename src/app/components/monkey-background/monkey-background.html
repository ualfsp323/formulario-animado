<div class="monkey-layer">
  <button class="monkey-toggle" (click)="toggleMonkey()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      <path d="M9 12l2 2 4-4"></path>
    </svg>
  </button>
  
  <div *ngFor="let monkey of monkeys; trackBy: trackByMonkey"
       class="bouncing-monkey"
       [class.disappear]="monkey.disappear"
       [style.background-image]="'url(' + monkeyImage + ')'"
       [style.top]="monkey.top"
       [style.left]="monkey.left">
  </div>
</div>
